name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires a GitHub environment named 'poc' with these variables set:
    #   AWS_ACCOUNT_ID, EC2_INSTANCE_ID, FILES_BUCKET_NAME,
    #   FRONTEND_BUCKET_NAME, CLOUDFRONT_DISTRIBUTION_ID, AWS_DEPLOY_ROLE_ARN
    # No SSH keys or open ports required — access is via SSM Session Manager.
    # See README.md → AWS Deployment for full setup instructions.
    environment: poc
    if: vars.AWS_ACCOUNT_ID != ''

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      # ── Backend build ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Build backend
        run: npm run build --prefix backend

      - name: Package backend artifact
        run: |
          cd backend
          zip -r ../backend-artifact.zip dist/ node_modules/ package.json
          cd ..
          echo "Artifact size: $(du -sh backend-artifact.zip | cut -f1)"

      # ── Deploy backend via SSM (no SSH, no open ports) ────────────────────
      - name: Write deploy script
        run: |
          cat > deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          # Fetch secrets from SSM Parameter Store
          ANTHROPIC_KEY=$(aws ssm get-parameter \
            --name /coba/poc/anthropic-key \
            --with-decryption \
            --query Parameter.Value --output text)
          DB_PATH=$(aws ssm get-parameter \
            --name /coba/poc/db-path \
            --query Parameter.Value --output text)
          S3_BUCKET=$(aws ssm get-parameter \
            --name /coba/poc/s3-files-bucket \
            --query Parameter.Value --output text)

          # Download artifact from S3
          aws s3 cp s3://${S3_BUCKET}/deployments/backend-artifact.zip /tmp/backend-artifact.zip

          # Extract artifact
          mkdir -p /app
          cd /app
          unzip -o /tmp/backend-artifact.zip
          rm /tmp/backend-artifact.zip

          # Write pm2 ecosystem file
          cat > /app/ecosystem.config.cjs << 'EOF'
          module.exports = {
            apps: [{
              name: 'coba-backend',
              script: '/app/dist/server.js',
              cwd: '/app',
              env: {
                NODE_ENV: 'production',
                PORT: '3000',
                USE_REAL_AI: 'true',
                AWS_REGION: 'eu-west-2',
              },
              log_date_format: 'YYYY-MM-DD HH:mm:ss',
              error_file: '/var/log/coba/err.log',
              out_file: '/var/log/coba/out.log',
              max_memory_restart: '800M',
            }]
          }
          EOF

          # Inject secrets and restart
          export ANTHROPIC_API_KEY="$ANTHROPIC_KEY"
          export DB_PATH="$DB_PATH"
          export S3_FILES_BUCKET="$S3_BUCKET"

          pm2 reload ecosystem.config.cjs --update-env \
            || pm2 start ecosystem.config.cjs

          pm2 save

          # Verify health
          sleep 3
          curl -sf http://localhost:3000/api/health \
            || (pm2 logs --lines 50 && exit 1)
          SCRIPT

      - name: Upload artifact and deploy script to S3
        run: |
          aws s3 cp backend-artifact.zip s3://${{ vars.FILES_BUCKET_NAME }}/deployments/backend-artifact.zip
          aws s3 cp deploy.sh s3://${{ vars.FILES_BUCKET_NAME }}/deployments/deploy.sh

      - name: Run deploy script via SSM
        env:
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          FILES_BUCKET: ${{ vars.FILES_BUCKET_NAME }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"aws s3 cp s3://${FILES_BUCKET}/deployments/deploy.sh /tmp/deploy.sh && bash /tmp/deploy.sh\"]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until the command finishes (max ~5 min)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "Deployment succeeded."
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "Deployment failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac

            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for SSM command to complete."
              exit 1
            fi
          done

      # ── Build and deploy frontend ──────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          NODE_ENV: production
          VITE_BUILD_NUMBER: ${{ github.run_number }}

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/_assets/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/_assets/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "_assets/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"
