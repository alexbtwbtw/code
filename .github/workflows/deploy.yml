name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires a GitHub environment named 'poc' with these variables set:
    #   AWS_ACCOUNT_ID, EC2_INSTANCE_ID, FILES_BUCKET_NAME,
    #   FRONTEND_BUCKET_NAME, CLOUDFRONT_DISTRIBUTION_ID, AWS_DEPLOY_ROLE_ARN
    # No SSH keys or open ports required — access is via SSM Session Manager.
    environment: poc
    if: vars.AWS_ACCOUNT_ID != ''

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      # ── Backend build ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: coba/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: coba/backend

      - name: Build backend
        run: npm run build
        working-directory: coba/backend

      - name: Package backend artifact
        run: |
          cd coba/backend
          zip -r ../../backend-artifact.zip dist/ node_modules/ package.json ecosystem.config.cjs
          cd ../..
          echo "Artifact size: $(du -sh backend-artifact.zip | cut -f1)"

      # ── Deploy backend via SSM (no SSH, no open ports) ────────────────────
      - name: Write deploy script
        run: |
          cat > deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          # Fetch secrets from SSM Parameter Store
          ANTHROPIC_KEY=$(aws ssm get-parameter \
            --name /coba/poc/anthropic-key \
            --with-decryption \
            --query Parameter.Value --output text)
          DB_PATH=$(aws ssm get-parameter \
            --name /coba/poc/db-path \
            --query Parameter.Value --output text)
          S3_BUCKET=$(aws ssm get-parameter \
            --name /coba/poc/s3-files-bucket \
            --query Parameter.Value --output text)

          # Download artifact from S3
          aws s3 cp s3://${S3_BUCKET}/deployments/backend-artifact.zip /tmp/backend-artifact.zip

          # Extract artifact
          mkdir -p /app /var/log/coba
          cd /app
          unzip -o /tmp/backend-artifact.zip
          rm /tmp/backend-artifact.zip

          # Write .env file so pm2 picks up secrets on every restart
          printf 'ANTHROPIC_API_KEY=%s\nS3_FILES_BUCKET=%s\nDB_PATH=%s\n' \
            "$ANTHROPIC_KEY" "$S3_BUCKET" "$DB_PATH" > /app/.env

          pm2 reload /app/ecosystem.config.cjs --update-env \
            || pm2 start /app/ecosystem.config.cjs

          pm2 save

          # Verify health through nginx (validates full stack)
          # Retry up to 10 times to account for app startup time
          for attempt in $(seq 1 10); do
            if curl -sf http://localhost/api/health; then
              echo "Health check passed on attempt $attempt."
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "Health check failed after 10 attempts."
              pm2 logs --lines 50
              exit 1
            fi
            echo "Attempt $attempt failed, retrying in 3s..."
            sleep 3
          done
          SCRIPT

      - name: Upload artifact and deploy script to S3
        run: |
          DEPLOY_HASH=$(sha256sum deploy.sh | awk '{print $1}')
          echo "DEPLOY_HASH=$DEPLOY_HASH" >> "$GITHUB_ENV"
          aws s3 cp backend-artifact.zip s3://${{ vars.FILES_BUCKET_NAME }}/deployments/backend-artifact.zip
          aws s3 cp deploy.sh s3://${{ vars.FILES_BUCKET_NAME }}/deployments/deploy.sh

      - name: Run deploy script via SSM
        env:
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          FILES_BUCKET: ${{ vars.FILES_BUCKET_NAME }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"set -e && aws s3 cp s3://${FILES_BUCKET}/deployments/deploy.sh /tmp/deploy.sh && echo '${DEPLOY_HASH}  /tmp/deploy.sh' | sha256sum -c - && bash /tmp/deploy.sh\"]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until the command finishes (max ~10 min)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "Deployment succeeded."
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "Deployment failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac

            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for SSM command to complete."
              exit 1
            fi
          done

      # ── Build and deploy frontend ──────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: coba/frontend

      - name: Build frontend
        run: npm run build
        working-directory: coba/frontend
        env:
          NODE_ENV: production

      - name: Sync frontend to S3
        run: |
          aws s3 sync coba/frontend/dist/assets/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/assets/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          aws s3 sync coba/frontend/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"
