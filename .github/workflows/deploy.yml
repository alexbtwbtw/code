name: Deploy to AWS

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: poc
    if: github.event.workflow_run.conclusion == 'success' && vars.AWS_ACCOUNT_ID != ''

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      # ── Backend build ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: coba/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: coba/backend

      - name: Build backend
        run: npm run build
        working-directory: coba/backend

      - name: Package backend artifact
        run: |
          cd coba/backend
          zip -r ../../backend-artifact.zip dist/ node_modules/ package.json ecosystem.config.cjs
          cd ../..
          echo "Artifact size: $(du -sh backend-artifact.zip | cut -f1)"

      # ── Deploy backend to EC2 ──────────────────────────────────────────────
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy artifact to EC2
        run: |
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            backend-artifact.zip \
            ec2-user@${{ vars.EC2_PUBLIC_IP }}:/tmp/backend-artifact.zip

      - name: Deploy and restart on EC2
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ec2-user@${{ vars.EC2_PUBLIC_IP }} << 'ENDSSH'
            set -e

            # Fetch secrets from SSM
            ANTHROPIC_KEY=$(aws ssm get-parameter \
              --name /coba/poc/anthropic-key \
              --with-decryption \
              --query Parameter.Value --output text)
            DB_PATH=$(aws ssm get-parameter \
              --name /coba/poc/db-path \
              --query Parameter.Value --output text)
            S3_BUCKET=$(aws ssm get-parameter \
              --name /coba/poc/s3-files-bucket \
              --query Parameter.Value --output text)

            # Ensure /app is owned by ec2-user
            sudo mkdir -p /app /var/log/coba
            sudo chown -R ec2-user:ec2-user /app /var/log/coba

            # Extract artifact
            cd /app
            unzip -o /tmp/backend-artifact.zip
            rm /tmp/backend-artifact.zip

            # Write .env file so pm2 picks up secrets on every restart
            printf 'ANTHROPIC_API_KEY=%s\nS3_FILES_BUCKET=%s\n' "$ANTHROPIC_KEY" "$S3_BUCKET" > /app/.env

            pm2 reload /app/ecosystem.config.cjs --update-env \
              || pm2 start /app/ecosystem.config.cjs

            pm2 save

            # Verify health
            sleep 3
            curl -sf http://localhost:3000/api/health \
              || (pm2 logs --lines 50 && exit 1)
          ENDSSH

      # ── Build and deploy frontend ──────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: coba/frontend

      - name: Build frontend
        run: npm run build
        working-directory: coba/frontend
        env:
          NODE_ENV: production

      - name: Sync frontend to S3
        run: |
          aws s3 sync coba/frontend/dist/assets/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/assets/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          aws s3 sync coba/frontend/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"
