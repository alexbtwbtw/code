name: Deploy — Home

on:
  push:
    branches: [main]
    paths: ['home/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires a GitHub environment named 'poc' with these variables set:
    #   AWS_ACCOUNT_ID, FRONTEND_BUCKET_NAME,
    #   CLOUDFRONT_DISTRIBUTION_ID, AWS_DEPLOY_ROLE_ARN
    environment: poc
    if: vars.AWS_ACCOUNT_ID != ''

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: home/frontend/package-lock.json

      # ── Build and deploy Home frontend ─────────────────────────────────────
      - name: Install Home frontend dependencies
        run: npm ci
        working-directory: home/frontend

      - name: Build Home frontend
        run: npm run build
        working-directory: home/frontend
        env:
          NODE_ENV: production

      - name: Sync Home frontend to S3
        run: |
          aws s3 sync home/frontend/dist/assets/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/assets/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          aws s3 sync home/frontend/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "assets/*" \
            --delete

      # ── CloudFront invalidation ────────────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"
