name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coba/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: coba/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          USE_REAL_AI: 'false'

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coba/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: |
            coba/frontend/package-lock.json
            coba/backend/package-lock.json

      - name: Install backend dependencies
        # tsc -b follows the @backend path alias into ../backend/src and needs
        # backend's node_modules to resolve @trpc/server, zod, etc.
        run: npm ci
        working-directory: coba/backend

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
