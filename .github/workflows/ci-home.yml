name: CI — Home

on:
  push:
    branches: [main]
    paths: ['home/**']
  pull_request:
    branches: [main]
    paths: ['home/**']
  workflow_dispatch:

jobs:
  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: home/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: home/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_BUILD_NUMBER: ${{ github.run_number }}
